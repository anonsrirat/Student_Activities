<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — ระบบจัดการกิจกรรมนิสิต TSU</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-top">
        <div class="login-logo-badge">TSU</div>
        <h1>ระบบจัดการกิจกรรมนิสิต</h1>
        <p>Student Activity Management System</p>
      </div>
      <div class="login-body">
        <p class="login-desc">
          เข้าสู่ระบบด้วยบัญชี Google ของมหาวิทยาลัยทักษิณ<br>
          <strong>(@tsu.ac.th)</strong> เท่านั้น
        </p>

        <a href="/api/auth/google" class="btn-google" id="google-btn">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          เข้าสู่ระบบด้วย Google TSU
        </a>

        <div class="error-banner" id="error-banner"></div>

        <p style="margin-top:24px;font-size:.78rem;color:var(--text-muted);text-align:center;">
          หากมีปัญหาในการเข้าสู่ระบบ ติดต่อฝ่ายกิจการนิสิต<br>
          <strong style="color:var(--text)">กลุ่ม 6720210057, 6720210050, 6720210102</strong>
        </p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const errMap = {
      domain: 'กรุณาใช้อีเมลมหาวิทยาลัยทักษิณ (@tsu.ac.th) เท่านั้น',
      cancelled: 'การเข้าสู่ระบบถูกยกเลิก',
      token: 'เกิดข้อผิดพลาดในการรับ Token กรุณาลองใหม่',
      server: 'เกิดข้อผิดพลาดบน Server กรุณาลองใหม่',
      no_config: 'ระบบยังไม่ได้ตั้งค่า Google OAuth กรุณาตั้งค่าใน .env ก่อน'
    };
    const err = errMap[params.get('error')];
    if (err) {
      const banner = document.getElementById('error-banner');
      banner.textContent = err;
      banner.style.display = 'block';
    }

    // If already logged in, redirect
    fetch('/api/auth/me', { credentials: 'include' }).then(r => {
      if (r.ok) return r.json();
    }).then(user => {
      if (user) window.location.href = user.role === 'staff' ? '/staff/dashboard' : '/dashboard';
    }).catch(() => {});
  </script>
</body>
</html>
