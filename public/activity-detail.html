<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดกิจกรรม — ระบบกิจกรรมนิสิต TSU</title>
  <link rel="stylesheet" href="/shared/style.css?v=20260613-2">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar">
        <span class="topbar-title">รายละเอียดกิจกรรม</span>
        <div class="topbar-actions">
          <a href="/activities" class="btn btn-outline btn-sm" id="back-btn">กลับ</a>
          <a href="/notifications" class="notif-btn" id="notif-btn"></a>
        </div>
      </header>
      <main class="content" id="content">
        <div class="empty-state"><p>กำลังโหลด...</p></div>
      </main>
    </div>
  </div>

  <script src="/shared/icons.js?v=20260613-2"></script>
  <script src="/shared/datepicker.js?v=20260613-2"></script>
  <script src="/shared/app.js?v=20260613-2"></script>
  <script>
    const id = new URLSearchParams(location.search).get('id');
    let activity = null;
    let currentUser = null;

    async function loadActivity() {
      if (!id) { document.getElementById('content').innerHTML = `<div class="empty-state">${icon('alert-triangle', { size: 48, cls: 'empty-icon' })}<h3>ไม่พบกิจกรรม</h3></div>`; return; }
      try {
        activity = await api.get(`/api/activities/${id}`);
        render();
      } catch {
        document.getElementById('content').innerHTML = `<div class="empty-state">${icon('alert-triangle', { size: 48, cls: 'empty-icon' })}<h3>ไม่พบกิจกรรม</h3></div>`;
      }
    }

    function render() {
      const full = activity.capacity > 0 && activity.registered_count >= activity.capacity;
      const regState = registrationState(activity);
      const canRegister = regState.ok && !activity.is_registered && !full;
      const isStaff = currentUser?.role === 'staff';

      document.getElementById('content').innerHTML = `
        <div style="max-width:760px">
          <div class="card mb-4">
            <div class="card-body">
              <div class="flex justify-between items-center mb-3 gap-3" style="flex-wrap:wrap">
                <h1 style="font-size:1.4rem;font-weight:700">${activity.title}</h1>
                ${activityStatusBadge(activity)}
              </div>
              <div class="mb-3">${categoryBadge(activity)}</div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0">
                <div class="meta-block">${icon('calendar', { size: 20 })}<div><div class="text-sm text-muted">วันที่</div><div class="font-semibold">${activityDateLabel(activity)}</div></div></div>
                <div class="meta-block">${icon('clock', { size: 20 })}<div><div class="text-sm text-muted">เวลา</div><div class="font-semibold">${activityTimeLabel(activity)}</div></div></div>
                <div class="meta-block">${icon('map-pin', { size: 20 })}<div><div class="text-sm text-muted">สถานที่</div><div class="font-semibold">${activity.location || '-'}</div></div></div>
                <div class="meta-block">${icon('chart-bar', { size: 20 })}<div><div class="text-sm text-muted">ชั่วโมงที่ได้รับ</div><div class="font-semibold">${formatHours(activity.hours_credit)}</div></div></div>
                <div class="meta-block">${icon('users', { size: 20 })}<div><div class="text-sm text-muted">ผู้ลงทะเบียน</div><div class="font-semibold">${activity.registered_count}${activity.capacity > 0 ? ' / ' + activity.capacity + ' คน' : ' คน'}</div></div></div>
                <div class="meta-block">${icon('user', { size: 20 })}<div><div class="text-sm text-muted">จัดโดย</div><div class="font-semibold">${activity.creator_name || 'เจ้าหน้าที่'}</div></div></div>
                <div class="meta-block" style="grid-column:1/-1">${icon('info', { size: 20 })}<div><div class="text-sm text-muted">ช่วงรับสมัคร</div><div class="font-semibold">${registrationWindowText(activity)}</div></div></div>
              </div>

              ${activity.description ? `<div style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px"><h3 class="font-semibold mb-2">รายละเอียด</h3><p style="line-height:1.7;color:var(--text-muted)">${activity.description.replace(/\n/g,'<br>')}</p></div>` : ''}

              <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
                ${isStaff ? `<a href="/staff/activities" class="btn btn-outline">${icon('arrow-left', { size: 16 })} จัดการกิจกรรม</a>` : ''}
                ${!isStaff && activity.is_registered
                  ? `${regState.ok ? `<button class="btn btn-danger" onclick="cancelRegister()">ยกเลิกการลงทะเบียน</button>` : `<div class="badge badge-closed" style="padding:8px 16px">อยู่นอกช่วงรับสมัคร ยกเลิกไม่ได้</div>`}
                     <a href="/submit-evidence?id=${id}" class="btn btn-outline">ยื่นหลักฐาน</a>`
                  : !isStaff && canRegister
                    ? `<button class="btn btn-primary" onclick="register()">ลงทะเบียนเข้าร่วม</button>`
                    : !isStaff ? `<div class="badge badge-closed" style="padding:8px 16px">${full ? 'กิจกรรมเต็มแล้ว' : regState.label}</div>` : ''}
              </div>
            </div>
          </div>
        </div>`;
    }

    async function register() {
      if (!await confirmDialog('ต้องการลงทะเบียนกิจกรรมนี้หรือไม่?', { title: 'ยืนยันการลงทะเบียน', confirmText: 'ลงทะเบียน' })) return;
      try {
        await api.post(`/api/activities/${id}/register`, {});
        toast('ลงทะเบียนสำเร็จ!', 'success');
        activity = await api.get(`/api/activities/${id}`);
        render();
      } catch (e) { toast(e.error || 'เกิดข้อผิดพลาด', 'error'); }
    }

    async function cancelRegister() {
      if (!await confirmDialog('ต้องการยกเลิกการลงทะเบียนหรือไม่?')) return;
      try {
        await api.del(`/api/activities/${id}/register`);
        toast('ยกเลิกการลงทะเบียนแล้ว', 'success');
        activity = await api.get(`/api/activities/${id}`);
        render();
      } catch (e) { toast(e.error || 'เกิดข้อผิดพลาด', 'error'); }
    }

    (async () => {
      document.getElementById('back-btn').innerHTML = `${icon('arrow-left', { size: 14 })} กลับ`;
      currentUser = await initLayout({ activePage: '/activities' });
      if (currentUser) loadActivity();
    })();
  </script>
</body>
</html>
