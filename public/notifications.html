<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การแจ้งเตือน — ระบบกิจกรรมนิสิต TSU</title>
  <link rel="stylesheet" href="/shared/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar">
        <span class="topbar-title">การแจ้งเตือน</span>
        <div class="topbar-actions">
          <button class="btn btn-outline btn-sm" onclick="readAll()">อ่านทั้งหมด</button>
        </div>
      </header>
      <main class="content">
        <div class="page-header">
          <div><h1>การแจ้งเตือน</h1><p id="unread-text">กำลังโหลด...</p></div>
        </div>
        <div class="card">
          <div class="card-body" id="notif-list">
            <div class="empty-state"><div class="empty-icon">🔔</div><p>กำลังโหลด...</p></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/shared/app.js"></script>
  <script>
    let notifs = [];
    const typeIcon = { evidence_approved: '✅', evidence_rejected: '❌', activity_reminder: '📅', info: 'ℹ️' };

    function render() {
      const el = document.getElementById('notif-list');
      if (!notifs.length) {
        el.innerHTML = '<div class="empty-state" style="padding:40px"><div class="empty-icon">🔔</div><h3>ไม่มีการแจ้งเตือน</h3></div>';
        return;
      }
      el.innerHTML = notifs.map(n => `
        <div class="notif-item${n.is_read ? '' : ' unread'}" onclick="markRead(${n.id}, this)" style="cursor:pointer">
          <div class="notif-dot${n.is_read ? ' read' : ''}"></div>
          <span style="font-size:1.3rem;flex-shrink:0">${typeIcon[n.type] || 'ℹ️'}</span>
          <div class="notif-content" style="flex:1">
            <div class="notif-title">${n.title}</div>
            ${n.message ? `<div class="notif-msg">${n.message}</div>` : ''}
            <div class="notif-time">${timeAgo(n.created_at)}</div>
          </div>
          ${!n.is_read ? '<span style="color:var(--primary);font-size:.75rem;flex-shrink:0">ใหม่</span>' : ''}
        </div>`).join('');
    }

    async function markRead(id, el) {
      const n = notifs.find(x => x.id === id);
      if (!n || n.is_read) return;
      try {
        await api.put(`/api/notifications/${id}/read`, {});
        n.is_read = 1;
        render();
        updateUnreadText();
      } catch {}
    }

    async function readAll() {
      try {
        await api.put('/api/notifications/read-all', {});
        notifs.forEach(n => n.is_read = 1);
        render();
        updateUnreadText();
        toast('อ่านทั้งหมดแล้ว', 'success');
      } catch {}
    }

    function updateUnreadText() {
      const unread = notifs.filter(n => !n.is_read).length;
      document.getElementById('unread-text').textContent = unread > 0 ? `มีการแจ้งเตือนที่ยังไม่ได้อ่าน ${unread} รายการ` : 'อ่านทั้งหมดแล้ว';
    }

    (async () => {
      await initLayout({ activePage: '/notifications' });
      try {
        const data = await api.get('/api/notifications/my');
        notifs = data.notifications || [];
        render();
        updateUnreadText();
      } catch { toast('เกิดข้อผิดพลาดในการโหลด', 'error'); }
    })();
  </script>
</body>
</html>
