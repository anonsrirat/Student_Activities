<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แดชบอร์ด (เจ้าหน้าที่) — ระบบกิจกรรมนิสิต TSU</title>
  <link rel="stylesheet" href="/shared/style.css?v=20260613-2">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar">
        <span class="topbar-title">แดชบอร์ดเจ้าหน้าที่</span>
        <div class="topbar-actions">
          <a href="/staff/activities" class="btn btn-primary btn-sm" id="top-add">สร้างกิจกรรม</a>
        </div>
      </header>
      <main class="content">
        <div class="page-header">
          <div><h1>แดชบอร์ดเจ้าหน้าที่</h1><p>ภาพรวมระบบจัดการกิจกรรมนิสิต</p></div>
        </div>

        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon blue" data-icon="calendar"></div><div class="stat-info"><div class="stat-value" id="s-total">-</div><div class="stat-label">กิจกรรมทั้งหมด</div></div></div>
          <div class="stat-card"><div class="stat-icon green" data-icon="check-circle"></div><div class="stat-info"><div class="stat-value" id="s-open">-</div><div class="stat-label">กิจกรรมเปิดรับสมัคร</div></div></div>
          <div class="stat-card"><div class="stat-icon yellow" data-icon="folder"></div><div class="stat-info"><div class="stat-value" id="s-evidence">-</div><div class="stat-label">หลักฐานรอตรวจ</div></div></div>
          <div class="stat-card"><div class="stat-icon red" data-icon="users"></div><div class="stat-info"><div class="stat-value" id="s-students">-</div><div class="stat-label">นิสิตทั้งหมด</div></div></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="card">
            <div class="card-header"><h3>กิจกรรมล่าสุด</h3><a href="/staff/activities" class="btn btn-outline btn-sm">ดูทั้งหมด</a></div>
            <div class="card-body" id="recent-list">
              <div class="empty-state" style="padding:32px"><p>กำลังโหลด...</p></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3>ลิงก์ด่วน</h3></div>
            <div class="card-body">
              <div style="display:flex;flex-direction:column;gap:10px">
                <a href="/staff/evidence" class="btn btn-outline w-full quick-link" data-icon="folder">ตรวจสอบหลักฐาน</a>
                <a href="/staff/activities" class="btn btn-outline w-full quick-link" data-icon="calendar">จัดการกิจกรรม</a>
                <a href="/staff/reports" class="btn btn-outline w-full quick-link" data-icon="chart">ดูรายงาน</a>
                <a href="/staff/criteria" class="btn btn-outline w-full quick-link" data-icon="clipboard">จัดการเกณฑ์</a>
                <a href="/staff/users" class="btn btn-outline w-full quick-link" data-icon="users">จัดการผู้ใช้</a>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/shared/icons.js?v=20260613-2"></script>
  <script src="/shared/datepicker.js?v=20260613-2"></script>
  <script src="/shared/app.js?v=20260613-2"></script>
  <script>
    (async () => {
      // Inflate data-icon stat icons + quick links
      document.querySelectorAll('.stat-card [data-icon]').forEach(el => el.innerHTML = icon(el.dataset.icon, { size: 24 }));
      document.querySelectorAll('.quick-link').forEach(el => {
        el.style.justifyContent = 'flex-start';
        el.style.gap = '10px';
        el.insertAdjacentHTML('afterbegin', icon(el.dataset.icon, { size: 16 }));
      });
      document.getElementById('top-add').innerHTML = `${icon('plus', { size: 14 })} สร้างกิจกรรม`;

      await initLayout({ activePage: '/staff/dashboard', requireRole: 'staff' });
      try {
        const data = await api.get('/api/stats/dashboard');
        document.getElementById('s-total').textContent = data.totalActivities;
        document.getElementById('s-open').textContent = data.openActivities;
        document.getElementById('s-evidence').textContent = data.pendingEvidence;
        document.getElementById('s-students').textContent = data.totalStudents;

        const el = document.getElementById('recent-list');
        if (data.recentActivities?.length) {
          el.innerHTML = data.recentActivities.map(a => `
            <div class="notif-item">
              <div class="notif-dot"></div>
              <div class="notif-content" style="flex:1">
                <div class="notif-title">${a.title}</div>
                <div class="notif-msg">${fmtDate(a.date)} ? ${a.registered_count} คน</div>
              </div>
              ${activityStatusBadge(a)}
            </div>`).join('');
        } else {
          el.innerHTML = '<div class="empty-state" style="padding:24px"><p>ยังไม่มีกิจกรรม</p></div>';
        }
      } catch { toast('เกิดข้อผิดพลาดในการโหลด', 'error'); }
    })();
  </script>
</body>
</html>
