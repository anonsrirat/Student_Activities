<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการกิจกรรม — ระบบกิจกรรมนิสิต TSU</title>
  <link rel="stylesheet" href="/shared/style.css?v=20260613-1">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="topbar">
        <span class="topbar-title">จัดการกิจกรรม</span>
      </header>
      <main class="content">
        <div class="page-header">
          <div><h1>จัดการกิจกรรม</h1><p>เพิ่ม แก้ไข และลบกิจกรรม</p></div>
          <button class="btn btn-primary" onclick="openCreateModal()" id="add-btn">เพิ่มกิจกรรม</button>
        </div>

        <div class="time-debug-card" id="time-debug">
          <div class="time-debug-head">
            <div>
              <strong>ตรวจสอบเวลาระบบรับสมัคร</strong>
              <p>ใช้ดูว่าเวลา Browser, Server และ Database ตรงกันหรือไม่</p>
            </div>
            <button class="btn btn-outline btn-sm" onclick="loadTimeDebug()">รีเฟรชเวลา</button>
          </div>
          <div class="time-debug-grid">
            <div><span>Browser</span><strong id="time-browser">-</strong></div>
            <div><span>Server Bangkok</span><strong id="time-server">-</strong></div>
            <div><span>Database NOW()</span><strong id="time-db">-</strong></div>
            <div><span>DB Time zone</span><strong id="time-zone">-</strong></div>
          </div>
        </div>

        <div class="filter-bar">
          <input type="text" id="search" class="form-control search-input" placeholder="ค้นหากิจกรรม...">
          <select id="filter-category" class="form-control"><option value="">ทุกหมวดหมู่</option></select>
          <select id="filter-status" class="form-control">
            <option value="">ทุกสถานะ</option>
            <option value="open">เปิดรับสมัคร</option>
            <option value="closed">ปิดรับสมัคร</option>
            <option value="cancelled">ยกเลิก</option>
          </select>
        </div>

        <div class="card">
          <div id="table-wrap">
            <div class="empty-state" style="padding:48px"><p>กำลังโหลด...</p></div>
          </div>
        </div>
        <div class="pagination" id="pagination"></div>
      </main>
    </div>
  </div>

  <!-- Modal สร้าง/แก้ไขกิจกรรม -->
  <div class="modal-overlay" id="activity-modal">
    <div class="modal" style="max-width:760px">
      <div class="modal-header">
        <h2 id="modal-title">เพิ่มกิจกรรม</h2>
        <button class="modal-close" aria-label="ปิด" id="modal-close-x"></button>
      </div>
      <div class="modal-body">
        <form id="activity-form">
          <input type="hidden" id="edit-id">
          <div class="form-group">
            <label class="form-label">ชื่อกิจกรรม <span class="required">*</span></label>
            <input type="text" class="form-control" id="f-title" required placeholder="ชื่อกิจกรรม">
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">หมวดหมู่ <span class="required">*</span></label>
              <div id="f-category-wrap"></div>
            </div>
            <div class="form-group">
              <label class="form-label">สถานะ</label>
              <select class="form-control" id="f-status">
                <option value="open">เปิดรับสมัคร</option>
                <option value="closed">ปิดรับสมัคร</option>
                <option value="cancelled">ยกเลิก</option>
              </select>
            </div>
          </div>
          <div class="form-row cols-3">
            <div class="form-group">
              <label class="form-label">ระยะเวลากิจกรรม</label>
              <select class="form-control" id="f-duration-mode" onchange="syncDurationMode()">
                <option value="single">กิจกรรมวันเดียว</option>
                <option value="multi">กิจกรรมหลายวัน</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">วันที่เริ่ม <span class="required">*</span></label>
              <input type="date" class="form-control" id="f-date" required>
            </div>
            <div class="form-group" id="end-date-group">
              <label class="form-label">วันที่สิ้นสุด</label>
              <input type="date" class="form-control" id="f-end-date">
            </div>
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">เวลาเริ่ม <span class="required">*</span></label>
              <input type="time" class="form-control" id="f-start" required>
            </div>
            <div class="form-group">
              <label class="form-label">เวลาสิ้นสุด <span class="required">*</span></label>
              <input type="time" class="form-control" id="f-end" required>
            </div>
          </div>
          <div class="form-section">
            <label class="toggle-row">
              <input type="checkbox" id="f-use-reg-window" onchange="syncRegWindow()">
              <span>
                <strong>กำหนดเวลาเปิด-ปิดรับสมัคร</strong>
                <small>ถ้าไม่เปิด ระบบจะใช้สถานะ "เปิดรับสมัคร/ปิดรับสมัคร" ตามปกติ</small>
              </span>
            </label>
            <div id="reg-window-fields" class="hidden">
              <div class="form-row cols-2">
                <div class="form-group">
                  <label class="form-label">เปิดรับสมัครวันที่</label>
                  <input type="date" class="form-control" id="f-reg-start-date">
                </div>
                <div class="form-group">
                  <label class="form-label">เวลาเปิดรับ</label>
                  <input type="time" class="form-control" id="f-reg-start-time">
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-group">
                  <label class="form-label">ปิดรับสมัครวันที่</label>
                  <input type="date" class="form-control" id="f-reg-end-date">
                </div>
                <div class="form-group">
                  <label class="form-label">เวลาปิดรับ</label>
                  <input type="time" class="form-control" id="f-reg-end-time">
                </div>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">สถานที่ <span class="required">*</span></label>
            <div class="location-row">
              <input type="text" class="form-control" id="f-location" list="location-options" placeholder="ห้อง / อาคาร / สถานที่" required>
              <button type="button" class="btn btn-outline" onclick="saveLocationPreset()" id="save-location-btn">บันทึกห้องนี้</button>
            </div>
            <datalist id="location-options"></datalist>
            <div id="location-presets" class="preset-list"></div>
          </div>
          <div class="form-row cols-2">
            <div class="form-group">
              <label class="form-label">จำนวนที่รับ (0 = ไม่จำกัด)</label>
              <input type="number" class="form-control" id="f-capacity" min="0" value="0">
            </div>
            <div class="form-group">
              <label class="form-label">ชั่วโมงที่ได้รับ <span class="required">*</span></label>
              <input type="number" class="form-control" id="f-hours" min="0" step="1" value="0" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">รายละเอียด</label>
            <textarea class="form-control" id="f-desc" rows="3" placeholder="รายละเอียดกิจกรรม..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline modal-close">ยกเลิก</button>
        <button class="btn btn-primary" onclick="saveActivity()" id="save-btn">บันทึก</button>
      </div>
    </div>
  </div>

  <script src="/shared/icons.js?v=20260613-1"></script>
  <script src="/shared/datepicker.js?v=20260613-1"></script>
  <script src="/shared/app.js?v=20260613-1"></script>
  <script>
    let categories = [];
    let savedLocations = [];
    let currentPage = 1;
    let catSelect = null;

    async function loadCategories() {
      categories = await api.getCached('/api/criteria', 120000);
      const filterSel = document.getElementById('filter-category');
      filterSel.innerHTML = '<option value="">ทุกหมวดหมู่</option>' + categories.map(c => `<option value="${c.id}">● ${c.name}</option>`).join('');
      catSelect = initCategorySelect(document.getElementById('f-category-wrap'), categories, {
        placeholder: '-- เลือกหมวดหมู่ --',
        allowEmpty: false,
      });
    }

    async function loadLocations() {
      try {
        savedLocations = await api.getCached('/api/activities/locations', 120000);
      } catch {
        savedLocations = [];
      }
      renderLocationPresets();
    }

    function renderLocationPresets() {
      const datalist = document.getElementById('location-options');
      const list = document.getElementById('location-presets');
      datalist.innerHTML = savedLocations.map(l => `<option value="${escapeHtml(l.name)}"></option>`).join('');
      if (!savedLocations.length) {
        list.innerHTML = '<span class="text-sm text-muted">ยังไม่มีห้องที่บันทึกไว้</span>';
        return;
      }
      list.innerHTML = savedLocations.slice(0, 8).map(l => {
        const jsName = JSON.stringify(l.name).replace(/</g, '\\u003c');
        return `
          <button type="button" class="preset-chip" onclick='useLocationPreset(${jsName})'>${escapeHtml(l.name)}</button>
          <button type="button" class="preset-remove" onclick="deleteLocationPreset(${l.id})" title="ลบห้องนี้">${icon('x', { size: 12 })}</button>
        `;
      }).join('');
    }

    function useLocationPreset(name) {
      document.getElementById('f-location').value = name;
    }

    async function saveLocationPreset() {
      const name = document.getElementById('f-location').value.trim();
      if (!name) { toast('กรุณากรอกชื่อห้องหรือสถานที่ก่อนบันทึก', 'warning'); return; }
      try {
        await api.post('/api/activities/locations', { name });
        toast('บันทึกห้องไว้ใช้ครั้งต่อไปแล้ว', 'success');
        try { sessionStorage.removeItem('__api_cache_/api/activities/locations'); } catch {}
        await loadLocations();
      } catch (e) { toast(e.error || 'บันทึกห้องไม่สำเร็จ', 'error'); }
    }

    async function deleteLocationPreset(id) {
      if (!await confirmDialog('ต้องการลบห้องหรือสถานที่นี้ออกจากรายการล่วงหน้าหรือไม่?', { title: 'ลบห้องที่บันทึกไว้', confirmText: 'ลบ', tone: 'danger' })) return;
      try {
        await api.del(`/api/activities/locations/${id}`);
        try { sessionStorage.removeItem('__api_cache_/api/activities/locations'); } catch {}
        await loadLocations();
      } catch (e) { toast(e.error || 'ลบห้องไม่สำเร็จ', 'error'); }
    }

    function updateBrowserTime() {
      const el = document.getElementById('time-browser');
      if (!el) return;
      el.textContent = new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'medium' });
    }

    async function loadTimeDebug() {
      updateBrowserTime();
      try {
        const data = await api.get('/api/activities/debug/time');
        document.getElementById('time-server').textContent = data.server_now_bangkok || data.server_now_iso || '-';
        document.getElementById('time-db').textContent = data.db_now || '-';
        document.getElementById('time-zone').textContent = `session ${data.db_session_time_zone || '-'} / global ${data.db_global_time_zone || '-'}`;
      } catch {
        document.getElementById('time-server').textContent = 'โหลดไม่ได้';
        document.getElementById('time-db').textContent = 'โหลดไม่ได้';
      }
    }

    async function loadActivities(page = 1) {
      currentPage = page;
      const search = document.getElementById('search').value;
      const category = document.getElementById('filter-category').value;
      const status = document.getElementById('filter-status').value;
      const params = new URLSearchParams({ page, limit: 15 });
      if (search) params.set('search', search);
      if (category) params.set('category', category);
      if (status) params.set('status', status);

      try {
        const data = await api.get(`/api/activities?${params}`);
        const wrap = document.getElementById('table-wrap');
        if (!data.activities.length) {
          wrap.innerHTML = `<div class="empty-state" style="padding:48px">${icon('calendar', { size: 48, cls: 'empty-icon' })}<h3>ไม่พบกิจกรรม</h3></div>`;
        } else {
          wrap.innerHTML = `<div class="table-wrap"><table>
            <thead><tr><th>ชื่อกิจกรรม</th><th>วันและเวลา</th><th>หมวดหมู่</th><th>ชั่วโมง</th><th>ผู้สมัคร</th><th>สถานะ</th><th>การดำเนินการ</th></tr></thead>
            <tbody>${data.activities.map(a => `
              <tr>
                <td><span class="font-semibold">${a.title}</span></td>
                <td>${activityScheduleLabel(a)}</td>
                <td>${categoryBadge(a) || '-'}</td>
                <td>${formatHours(a.hours_credit)}</td>
                <td>${a.registered_count}${a.capacity > 0 ? '/' + a.capacity : ''}</td>
                <td>${activityStatusBadge(a)}</td>
                <td>
                  <div class="flex gap-2">
                    ${a.status === 'open'
                      ? `<button class="btn btn-warning btn-sm" onclick="quickSetStatus(${a.id}, 'closed')" title="ปิดรับสมัคร">${icon('x', { size: 14 })} ปิดรับ</button>`
                      : `<button class="btn btn-success btn-sm" onclick="quickSetStatus(${a.id}, 'open')" title="เปิดรับสมัคร">${icon('check', { size: 14 })} เปิดรับ</button>`}
                    <button class="btn btn-outline btn-sm" onclick='openEditModal(${JSON.stringify(a)})' title="แก้ไข">${icon('edit', { size: 14 })}</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteActivity(${a.id})" title="ลบ">${icon('trash', { size: 14 })}</button>
                  </div>
                </td>
              </tr>`).join('')}
            </tbody></table></div>`;
        }
        renderPagination(document.getElementById('pagination'), data.page, data.pages, loadActivities);
      } catch { toast('เกิดข้อผิดพลาด', 'error'); }
    }

    function openCreateModal() {
      document.getElementById('modal-title').textContent = 'เพิ่มกิจกรรม';
      document.getElementById('edit-id').value = '';
      document.getElementById('activity-form').reset();
      document.getElementById('f-duration-mode').value = 'single';
      catSelect?.setValue('');
      document.getElementById('f-date')._setDate?.('');
      document.getElementById('f-end-date')._setDate?.('');
      document.getElementById('f-start')._setTime?.('');
      document.getElementById('f-end')._setTime?.('');
      document.getElementById('f-use-reg-window').checked = false;
      setDateTimeControls('f-reg-start', '', '');
      setDateTimeControls('f-reg-end', '', '');
      syncDurationMode();
      syncRegWindow();
      clearValidationErrors();
      openModal('activity-modal');
    }

    function openEditModal(a) {
      document.getElementById('modal-title').textContent = 'แก้ไขกิจกรรม';
      document.getElementById('edit-id').value = a.id;
      document.getElementById('f-title').value = a.title || '';
      catSelect?.setValue(a.category_id || '');
      document.getElementById('f-status').value = a.status || 'open';
      const dateVal = a.date ? a.date.slice(0, 10) : '';
      const endDateVal = a.end_date ? a.end_date.slice(0, 10) : '';
      document.getElementById('f-duration-mode').value = endDateVal && endDateVal !== dateVal ? 'multi' : 'single';
      document.getElementById('f-date')._setDate?.(dateVal);
      document.getElementById('f-end-date')._setDate?.(endDateVal);
      document.getElementById('f-start')._setTime?.(a.start_time || '');
      document.getElementById('f-end')._setTime?.(a.end_time || '');
      const regStart = splitDateTime(a.registration_start_at);
      const regEnd = splitDateTime(a.registration_end_at);
      document.getElementById('f-use-reg-window').checked = !!(regStart.date || regEnd.date);
      setDateTimeControls('f-reg-start', regStart.date, regStart.time);
      setDateTimeControls('f-reg-end', regEnd.date, regEnd.time);
      document.getElementById('f-location').value = a.location || '';
      document.getElementById('f-capacity').value = a.capacity || 0;
      document.getElementById('f-hours').value = Math.round(Number(a.hours_credit || 0));
      document.getElementById('f-desc').value = a.description || '';
      syncDurationMode();
      syncRegWindow();
      clearValidationErrors();
      openModal('activity-modal');
    }

    function syncDurationMode() {
      const isMulti = document.getElementById('f-duration-mode').value === 'multi';
      document.getElementById('end-date-group').classList.toggle('hidden', !isMulti);
      if (!isMulti) document.getElementById('f-end-date')._setDate?.('');
    }

    function syncRegWindow() {
      const enabled = document.getElementById('f-use-reg-window').checked;
      document.getElementById('reg-window-fields').classList.toggle('hidden', !enabled);
      if (!enabled) {
        setDateTimeControls('f-reg-start', '', '');
        setDateTimeControls('f-reg-end', '', '');
      }
    }

    function setDateTimeControls(prefix, date, time) {
      document.getElementById(`${prefix}-date`)._setDate?.(date || '');
      document.getElementById(`${prefix}-time`)._setTime?.(time || '');
    }

    function clearValidationErrors() {
      document.querySelectorAll('.form-control.invalid').forEach(el => el.classList.remove('invalid'));
      catSelect?.setInvalid(false);
    }

    function validateField(id, condition) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('invalid', !condition);
      return condition;
    }

    async function saveActivity() {
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      clearValidationErrors();

      const id = document.getElementById('edit-id').value;
      const title = document.getElementById('f-title').value.trim();
      const categoryId = catSelect?.getValue() || '';
      const date = document.getElementById('f-date').value;
      const startTime = document.getElementById('f-start').value;
      const endTime = document.getElementById('f-end').value;
      const location = document.getElementById('f-location').value.trim();
      const hoursVal = Number(document.getElementById('f-hours').value || 0);
      const isMulti = document.getElementById('f-duration-mode').value === 'multi';
      const useRegWindow = document.getElementById('f-use-reg-window').checked;
      const endDate = isMulti ? document.getElementById('f-end-date').value : '';

      // Validate required fields
      let valid = true;
      if (!validateField('f-title', !!title)) valid = false;
      if (!categoryId) { catSelect?.setInvalid(true); valid = false; }
      if (!validateField('f-date', !!date)) valid = false;
      if (!validateField('f-start', !!startTime)) valid = false;
      if (!validateField('f-end', !!endTime)) valid = false;
      if (!validateField('f-location', !!location)) valid = false;
      if (!validateField('f-hours', hoursVal > 0)) valid = false;

      if (!valid) {
        toast('กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน', 'error');
        btn.disabled = false;
        return;
      }

      const regStartDate = document.getElementById('f-reg-start-date').value;
      const regStartTime = document.getElementById('f-reg-start-time').value;
      const regEndDate = document.getElementById('f-reg-end-date').value;
      const regEndTime = document.getElementById('f-reg-end-time').value;

      if (isMulti && !endDate) {
        toast('กรุณาเลือกวันที่สิ้นสุดของกิจกรรมหลายวัน', 'error');
        btn.disabled = false;
        return;
      }
      if (useRegWindow && (!regStartDate || !regEndDate)) {
        toast('กรุณาระบุวันเปิดและวันปิดรับสมัคร', 'error');
        btn.disabled = false;
        return;
      }
      const body = {
        title,
        category_id: categoryId || null,
        status: document.getElementById('f-status').value,
        date,
        end_date: endDate || null,
        start_time: startTime,
        end_time: endTime,
        registration_start_at: useRegWindow ? buildDateTime(regStartDate, regStartTime) : null,
        registration_end_at: useRegWindow ? buildDateTime(regEndDate, regEndTime || '23:59') : null,
        location,
        capacity: document.getElementById('f-capacity').value,
        hours_credit: Math.round(hoursVal),
        description: document.getElementById('f-desc').value,
      };
      if (!await confirmDialog(id ? 'ต้องการบันทึกการแก้ไขกิจกรรมนี้หรือไม่?' : 'ต้องการสร้างกิจกรรมนี้หรือไม่?', {
        title: id ? 'ยืนยันการแก้ไขกิจกรรม' : 'ยืนยันการสร้างกิจกรรม',
        confirmText: 'บันทึก'
      })) {
        btn.disabled = false;
        return;
      }
      try {
        if (id) await api.put(`/api/activities/${id}`, body);
        else await api.post('/api/activities', body);
        toast(id ? 'แก้ไขกิจกรรมสำเร็จ' : 'สร้างกิจกรรมสำเร็จ', 'success');
        closeModal('activity-modal');
        loadActivities(currentPage);
      } catch (e) { toast(e.error || 'เกิดข้อผิดพลาด', 'error'); }
      btn.disabled = false;
    }

    async function deleteActivity(id) {
      if (!await confirmDialog('ต้องการลบกิจกรรมนี้หรือไม่?', { title: 'ลบกิจกรรม', confirmText: 'ลบ', tone: 'danger' })) return;
      try {
        await api.del(`/api/activities/${id}`);
        toast('ลบกิจกรรมแล้ว', 'success');
        loadActivities(currentPage);
      } catch (e) { toast(e.error || 'เกิดข้อผิดพลาด', 'error'); }
    }

    async function quickSetStatus(id, status) {
      const label = status === 'open' ? 'เปิดรับสมัคร' : 'ปิดรับสมัคร';
      if (!await confirmDialog(`ต้องการ${label}กิจกรรมนี้หรือไม่?`, { title: `ยืนยัน${label}`, confirmText: label })) return;
      try {
        await api.put(`/api/activities/${id}/status`, { status });
        toast(`${label}แล้ว`, 'success');
        loadActivities(currentPage);
      } catch (e) { toast(e.error || 'เปลี่ยนสถานะไม่สำเร็จ', 'error'); }
    }

    (async () => {
      initAllPickers();
      syncDurationMode();
      syncRegWindow();
      document.getElementById('add-btn').innerHTML = `${icon('plus', { size: 16 })} เพิ่มกิจกรรม`;
      await initLayout({ activePage: '/staff/activities', requireRole: 'staff' });
      // Load categories, locations, and time debug in parallel
      await Promise.all([loadCategories(), loadLocations(), loadTimeDebug()]);
      setInterval(updateBrowserTime, 1000);
      loadActivities();
      const doSearch = debounce(() => loadActivities(1));
      document.getElementById('search').addEventListener('input', doSearch);
      document.getElementById('filter-category').addEventListener('change', () => loadActivities(1));
      document.getElementById('filter-status').addEventListener('change', () => loadActivities(1));
    })();
  </script>
</body>
</html>
